# meowg1k Configuration File
# Replace provider/model values with your own, or use a preset config from the GitHub repo.

schema_version: 1

filter:
  ignore:
    - "**/*.lock"
    - "*.min.js"
    - "*.min.css"
    - "*.map"
    - "go.sum"
    - "vendor/"
    - "node_modules/"
    - ".git/"
    - ".idea/"
    - ".vscode/"
    - ".meowg1k/"
    - "dist/"
    - "build/"
    - "bin/"
    - "__pycache__/"
    - ".DS_Store"

providers:
  primary:
    type: "openai-compatible"
    base_url: "https://api.your-provider.com/v1"
    api_key_env: "MEOW_API_KEY"

models:
  primary:
    provider: "primary"
    model: "MODEL_NAME"

presets:
  base:
    cache:
      enabled: true
      ttl: "24h"
    request:
      temperature: 0.2
      top_p: 0.95
    timeout: "5m"

  default:
    extends: "base"
    model: "primary"

flows:
  write:
    preset: "default"
    system_prompt: "You are a helpful assistant."
    tasks:
      review:
        preset: "default"
        user_prompt: "Review the code for correctness, design, performance, and security."

  index:
    preset: "default"
    chunker:
      max_runes: 1024
      overlap_runes: 128
    batch_size: 64

  answer:
    preset: "default"
    retrieval:
      top_k: 20
      min_score: 0.4
    system_prompt: "Answer based on the provided context only."

  draft:
    commit:
      preset: "default"
      strategy: "summarize"
      system_prompt: "Write a Conventional Commit message."
    pr:
      preset: "default"
      strategy: "summarize"
      system_prompt: "Write a Pull Request description."

agent:
  system_prompt: "You are an autonomous coding agent."
  tools:
    search_defaults:
      snapshots: ["_workdir_", "_stage_", "_head_"]
      top_k: 10
      min_score: 0.6
  safety:
    max_steps: 30
    circuit_breaker:
      max_restarts: 5
    dry_run: false
  pipelines:
    default:
      steps: ["discover", "plan", "execute", "verify", "final"]
  personas:
    discover:
      role: "Principal Software Engineer"
      preset: "default"
      tools: ["dir_list", "search_text", "search_semantic", "file_read"]
      system_persona: "You gather minimum context needed to act."
      user_instructions: "List key files and constraints; do not edit files."
    plan:
      role: "Technical Project Manager"
      preset: "default"
      tools: ["plan_read", "plan_init", "file_read", "search_text"]
      system_persona: "You convert context into a task list."
      user_instructions: "Create an ordered plan with clear steps."
    execute:
      role: "Principal Software Engineer"
      preset: "default"
      tools: ["file_read", "file_write", "file_edit", "shell_exec", "plan_update_task"]
      system_persona: "You implement the plan safely."
      user_instructions: "Make the smallest correct diff and update tasks."
    verify:
      role: "Principal QA Engineer"
      preset: "default"
      tools: ["shell_exec", "git_diff", "plan_update_task"]
      system_persona: "You validate correctness."
      user_instructions: "Check diffs and run tests when useful."
    final:
      role: "Technical Project Manager"
      preset: "default"
      tools: []
      system_persona: "You report outcomes."
      user_instructions: "Summarize what changed and why."

activities:
  summarize:
    preset: "default"
    strategy:
      type: "plain"
      include_original_file: false
      include_changed_file: false
    system_prompt: "Summarize changes concisely."
    rules:
      - match: "**/*.{lock,sum}"
        skip: true
