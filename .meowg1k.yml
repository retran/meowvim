filter:
  ignore:
    - "*.lock"
    - "*.min.js"
    - "*.min.css"
    - "vendor/"
    - "node_modules/"
    - ".git/"
    - ".meowg1k/"
    - "**/.DS_Store"
    - "**/lazy-lock.json"

models:
  gemini-flash:
    provider: "gemini"
    model: "gemini-3-flash-preview"
    rateLimit:
      requestsPerMinute: 15
      tokensPerMinute: 300000
      requestsPerDay: 300
    maxInputTokens: 100000

  gemini-pro:
    provider: "gemini"
    model: "gemini-3-pro-preview"
    rateLimit:
      requestsPerMinute: 10
      tokensPerMinute: 150000
      requestsPerDay: 150

  gemini-embeddings:
    provider: "gemini"
    model: "text-embedding-004"
    rateLimit:
      requestsPerMinute: 3000
      tokensPerMinute: 1000000
      requestsPerDay: 1000000

cache:
  enabled: true
  ttl: "24h"

profiles:
  gemini-flash:
    model: "gemini-flash"
    temperature: 0.3
    timeout: "10m"
    cache:
      enabled: true
      ttl: "24h"

  gemini-pro:
    model: "gemini-pro"
    timeout: "10m"
    temperature: 0.2
    topP: 0.95
    cache:
      enabled: true
      ttl: "72h"

  gemini-embeddings:
    model: "gemini-embeddings"
    timeout: "10m"
    cache:
      enabled: true
      ttl: "72h"

  smart:
    model: "gemini-pro"
    timeout: "15m"
    temperature: 0.3
    topP: 0.95
    cache:
      enabled: true
      ttl: "72h"

  embeddings:
    model: "gemini-embeddings"
    timeout: "10m"
    cache:
      enabled: true
      ttl: "72h"

write:
  default:
    profile: "gemini-flash"
    systemPrompt: >-
      You are an elite software architect and code generation specialist.
      Your output must be production-grade, strictly following the user's requirements.
      Do not include conversational filler; return only the requested code or analysis.

  tasks:
    review:
      profile: "smart"
      userPrompt: >-
        Perform a rigorous code review of the meowvim Neovim configuration.

        REVIEW DIMENSIONS:

        1. **Lua Code Quality & Neovim Conventions**
           - Lua syntax and idioms: proper table construction, function definitions, module returns
           - Neovim API usage: vim.opt vs vim.o vs vim.g, proper autocmd and keymap definitions
           - lazy.nvim patterns: correct plugin specification, dependencies, lazy loading setup
           - Error handling: pcall usage for optional features, graceful degradation
           - Performance: avoid startup cost, efficient autocmds, minimal global pollution

        2. **Plugin Configuration & Integration**
           - Plugin specs: correct repository URLs, version pinning, dependency declarations
           - Configuration structure: logical organization, proper config function usage
           - Keybinding conflicts: ensure no overlapping mappings, consistent leader key usage
           - Plugin compatibility: version compatibility, deprecated API usage
           - Feature toggles: proper environment variable handling, conditional loading

        3. **Modularity & Organization**
           - File structure: appropriate separation of concerns, clear module boundaries
           - Code reuse: shared utilities in proper locations, avoiding duplication
           - Configuration consistency: unified patterns across plugin configurations
           - Documentation: clear comments for complex configurations, plugin purposes
           - Naming conventions: consistent file and variable naming across project

        4. **User Experience & Accessibility**
           - Discoverability: which-key integration, helpful descriptions for keybindings
           - Sensible defaults: configurations that work out of the box for most users
           - Customization: easy override points for user preferences
           - Performance perception: fast startup, responsive UI, minimal loading delays
           - Error messages: helpful feedback when things go wrong

        5. **Development Environment Integration**
           - LSP configuration: proper server setup, completion, diagnostics
           - Debugging setup: DAP configuration for supported languages
           - Git integration: efficient workflows with fugitive and gitsigns
           - Terminal integration: proper shell handling, background job management
           - GUI optimization: Neovide-specific settings, font and rendering options

        6. **Platform & Environment Considerations**
           - macOS integration: Raycast scripts, native feel, proper path handling
           - Container support: development container workflows, remote development
           - Theme consistency: proper color scheme application, terminal compatibility
           - Environment variables: proper handling of MEOW_* configuration variables

        OUTPUT FORMAT:
        1. **Executive Summary** — 2-4 bullets highlighting overall configuration quality.
        2. **Critical Issues** — Blocking problems (broken plugins, startup errors, major conflicts).
        3. **Suggestions** — Specific improvements with code references.
        4. **Configuration Patch** — Exact Lua code blocks to fix identified issues.

    doc:
      profile: "smart"
      userPrompt: >-
        Generate comprehensive documentation for meowvim Neovim configuration.

        DOCUMENTATION REQUIREMENTS:

        **Lua Module Documentation**
        - Module purpose: Clear description of what the configuration does
        - Dependencies: Required plugins, external tools, environment setup
        - Configuration options: Available customization points, default values
        - Usage examples: How to use features, common workflows
        - Plugin-specific: Keybindings, commands, integration points

        **Plugin Configuration Documentation**
        - Setup explanation: Why this plugin, what problem it solves
        - Configuration choices: Explain non-obvious settings, performance trade-offs
        - Keybinding rationale: Why specific keys were chosen, mnemonics
        - Integration notes: How it works with other plugins, potential conflicts
        - Customization: How users can override or extend the configuration

        **Neovim API Documentation**
        - Options explanation: What each vim.opt setting controls and why it's set
        - Autocmd purpose: When events trigger, what they accomplish
        - Keymap documentation: Mode, key, action, and description for each mapping
        - Variable usage: Global variables, their purpose, expected values

        **Feature Documentation**
        - Workflow descriptions: How features work together for common tasks
        - Environment integration: How meowvim integrates with system and development tools
        - Troubleshooting: Common issues and solutions
        - Performance notes: Impact of features on startup time and responsiveness

        **User Customization Guide**
        - Override patterns: How to modify configurations without editing core files
        - Environment variables: MEOW_* variables and their effects
        - Personal config: Where to put user-specific settings

        OUTPUT: Only the documentation comments and explanations.

    test:
      profile: "gemini-pro"
      userPrompt: >-
        Write robust unit tests for the provided code.
        Requirements:
        - Use a standard testing framework appropriate for the language (e.g., busted for Lua).
        - Implement table-driven tests to cover happy paths, edge cases, and error boundaries.
        - Ensure tests are independent, deterministic, and mock external dependencies where necessary.
        - Return only valid, compilable test code.

    plugin:
      profile: "smart"
      userPrompt: >-
        Create or configure Neovim plugins following meowvim patterns and lazy.nvim specifications.

        PLUGIN CONFIGURATION PATTERNS:

        **lazy.nvim Plugin Specification**
        - Structure: Return table with plugin spec, follow lazy.nvim schema
        - Repository: Use full GitHub URL or short name format
        - Dependencies: Explicit dependency declarations, load order
        - Lazy loading: Event-based, command-based, or filetype-based loading (critical for startup)
        - Configuration: Use config function for setup, opts for simple options
        - Keybindings: Define in keys table with descriptions for which-key

        **File Organization**
        - Location: lua/plugins/plugin-name.lua for each major plugin
        - Naming: Use plugin name without nvim- prefix (e.g., treesitter.lua for nvim-treesitter)
        - Returns: Single plugin spec table or array of related plugin specs
        - Comments: Plugin purpose, key features, integration notes

        **Configuration Patterns**
        - Setup function: Call plugin's setup() with appropriate options
        - Performance: Lazy load whenever possible, minimize startup impact
        - Integration: Consider interactions with existing meowvim plugins
        - Defaults: Sensible defaults that work for most users
        - Customization: Respect global Meow configuration where applicable

        **Keybinding Conventions**
        - Leader key: <leader> (space) for most plugin commands
        - Consistency: Follow existing meowvim keybinding patterns
        - Mnemonics: Use memorable key combinations (e.g., <leader>g for git)
        - which-key: Always provide descriptions for discoverability
        - Modes: Appropriate mode for each binding (normal, visual, insert)

        OUTPUT: Complete plugin configuration file(s) following meowvim patterns.

    refactor:
      profile: "smart"
      userPrompt: >-
        Refactor meowvim configuration to improve maintainability, performance, and user experience.

        REFACTORING PRINCIPLES:

        **1. Performance Optimization**
        - Startup time: Minimize synchronous operations, maximize lazy loading
        - Memory usage: Reduce plugin overhead, efficient configuration patterns
        - Lazy loading: Convert eager loading to event/command-based loading
        - Plugin optimization: Remove unused features, optimize plugin configurations
        - Autocmd efficiency: Combine related autocmds, use appropriate events

        **2. Code Organization & Modularity**
        - File structure: Logical grouping of related functionality
        - Module boundaries: Clear separation between plugins, config, and utilities
        - Code reuse: Extract common patterns into shared utilities
        - Configuration hierarchy: Clear override patterns for user customization
        - Documentation: Inline comments explaining complex configurations

        **3. User Experience Improvements**
        - Keybinding consistency: Unified patterns across all plugins
        - Discoverability: Better which-key integration, helpful descriptions
        - Error handling: Graceful degradation when plugins or tools are missing
        - Customization: Easier override points for user preferences
        - Sensible defaults: Configurations that work well out of the box

        **4. Plugin Integration & Consistency**
        - Theme integration: Consistent color scheme application
        - LSP workflow: Streamlined language server configuration and usage
        - Completion consistency: Unified completion sources and behavior
        - UI coherence: Consistent styling across all UI components
        - Feature toggles: Environment-based feature enabling/disabling

        **5. Maintainability & Future-Proofing**
        - Plugin version management: Appropriate version pinning strategies
        - Deprecated API migration: Update to current Neovim APIs
        - Configuration patterns: Follow current lazy.nvim and Neovim best practices
        - Error resilience: Handle plugin failures gracefully

        **6. Platform Integration**
        - macOS optimization: Better integration with system tools and workflows
        - Terminal compatibility: Consistent behavior across terminal emulators
        - GUI optimization: Enhanced Neovide experience

        CONSTRAINTS:
        - Preserve existing functionality and user-visible behavior
        - Maintain backward compatibility with user customizations
        - Keep existing keybindings unless significantly improving UX
        - Respect plugin API contracts and version compatibility
        - Maintain zero-configuration philosophy

        OUTPUT FORMAT:
        1. Refactored Configuration
        2. Change Summary (Performance, Organization, UX)
        3. Migration Guide
        4. Breaking Changes

    theme:
      profile: "smart"
      userPrompt: >-
        Create or configure color themes for meowvim following Neovim colorscheme conventions.

        THEME CONFIGURATION REQUIREMENTS:

        **Color Scheme Integration**
        - Base theme: Support for Catppuccin and Tokyo Night as primary themes
        - Plugin integration: Ensure all plugins respect theme colors
        - UI consistency: Unified colors across lualine, bufferline, tree-sitter, etc.
        - Terminal compatibility: Colors that work well in various terminal emulators
        - GUI optimization: Enhanced colors and fonts for Neovide

        **Theme Structure**
        - Configuration: Theme selection via MEOW_THEME environment variable
        - Fallback: Graceful handling when theme is not available
        - Customization: Easy override points for user color preferences
        - Plugin coordination: Ensure theme loads before UI plugins
        - Performance: Minimal impact on startup time

        **Supported Themes**
        - Catppuccin: Modern pastel theme with multiple variants (mocha, macchiato, frappe, latte)
        - Tokyo Night: Popular dark theme with good contrast and readability
        - Extensibility: Pattern for adding new themes easily
        - User themes: Support for user-provided color schemes

        OUTPUT: Complete theme configuration with proper plugin integration.

index:
  profile: "embeddings"
  chunker:
    maxRunes: 1024
    overlapRunes: 128
  batchSize: 64

answer:
  profile: "smart"
  topK: 10
  minScore: 0.6
  systemPrompt: >-
    You are an expert Neovim configuration developer and Lua programmer with deep knowledge of meowvim.

    MEOWVIM CONTEXT:

    **Architecture Overview**
    - Modern Neovim distribution built with lazy.nvim plugin manager
    - Modular configuration with separate plugin files in lua/plugins/
    - Zero-configuration philosophy with sensible defaults
    - Cross-platform support with macOS-focused optimizations
    - Performance-first approach with lazy loading and startup optimization

    **Core Components**
    - Plugin Manager: lazy.nvim with intelligent dependency management and lazy loading
    - Language Support: LSP via nvim-lspconfig, syntax highlighting via nvim-treesitter
    - Completion Engine: nvim-cmp with multiple sources (LSP, snippets, Copilot)
    - UI Framework: Modern interface with lualine, bufferline, which-key, noice.nvim
    - Development Tools: Git integration, debugging (nvim-dap), testing (neotest)

    **Configuration Patterns**
    - Each plugin configured in separate file under lua/plugins/
    - Shared configuration via global Meow table
    - Environment-based feature toggles (MEOW_THEME, MEOW_ENABLE_COPILOT)
    - Performance optimizations: disabled builtin plugins, optimized lazy loading
    - Consistent keybinding patterns with leader key (space) and which-key integration

    GUIDELINES:
    - Base answers on actual meowvim configuration files and patterns.
    - Reference specific plugin configurations and their file locations.
    - Quote relevant Lua code snippets to illustrate points.
    - Be precise, concise, and reference specific code elements.

agent:
  system_prompt: >-
    You are an autonomous senior coding agent working in the meowvim codebase.
    Goal: Complete the user's objective with minimal, safe, and verifiable steps.
    - **No Fluff**: Do not narrate your thought process unless necessary.
    - **Safe Changes**: Verify files exist before editing. Use atomic writes.
    - **Context Awareness**: Use `list_files` first to understand structure, then `read_file` sparingly.
    - **Final Output**: The last message must be a conclusive report, not a tool call.

  tools:
    searchDefaults:
      snapshots: ["_workdir_", "_stage_", "_head_"]
      topK: 10
      minScore: 0.6
  safety:
    max_steps: 0
    circuit_breaker:
      max_restarts: 5
    dry_run: false
  flows:
    default:
      instructions: >-
        Execute in order: Discover -> Plan -> Execute -> Verify -> Final.
        Pass context strictly through step outputs. Do not restart unless blocked.
      steps: ["discover", "plan", "execute", "verify", "final"]
    quick:
      instructions: >-
        Execute in order: Discover -> Execute -> Verify -> Final.
        Prioritize speed for simple changes.
      steps: ["discover", "execute", "verify", "final"]
  personas:
    discover:
      role: "Discovery"
      profile: "gemini-flash"
      tools: ["list_files", "grep_files", "search_code", "read_file", "summarize", "memorize_fact"]
      system_persona: >-
        Map the relevant code surface. Use `list_files` to find targets, then `grep_files` or `read_file`.
        Do not read entire repositories. Identify constraints and dependencies.
      user_instructions: >-
        Output a concise map of relevant files and their roles. Identify where changes are needed.

    plan:
      role: "Planner"
      profile: "gemini-pro"
      tools: ["get_plan", "create_plan", "memorize_fact"]
      system_persona: >-
        Create a linear, step-by-step plan. Each step must be a concrete action (e.g., "Edit file X", "Run test Y").
        Avoid vague steps like "Investigate".
      user_instructions: >-
        Review discovery output. Generate a plan with `create_plan`. Output the plan text.

    execute:
      role: "Executor"
      profile: "gemini-pro"
      tools: ["get_plan", "read_file", "write_file", "edit_file", "run_shell", "update_task", "memorize_fact"]
      system_persona: >-
        Implement the plan. Write production-ready code.
        - Prefer `edit_file` for small changes, `write_file` for new files.
        - Always verify file content before regex replacement.
        - Mark tasks as complete as you go.
      user_instructions: >-
        Execute the active task. Show the diff of what you changed.

    verify:
      role: "Verifier"
      profile: "gemini-flash"
      tools: ["get_plan", "run_shell", "get_diff", "restart_with_instruction", "memorize_fact"]
      system_persona: >-
        Check the work. Run linters, tests, or compilation checks.
        If verification fails, use `restart_with_instruction` to send the agent back to Execute with specific fix instructions.
      user_instructions: >-
        Verify the changes. If successful, output "Verified". If not, describe the failure and restart.

    final:
      role: "Reporter"
      profile: "gemini-pro"
      tools: []
      system_persona: >-
        Summarize the work done.
      user_instructions: >-
        Provide a clean summary of changes, files affected, and any manual steps required by the user.

summarize:
  default:
    profile: "gemini-flash"
    systemPrompt: >-
      Summarize the code change in one sentence. Focus on functional impact (what changed and why).
  rules:
    - match: "**/*.lua"
      systemPrompt: "Summarize Lua config changes, specifically plugin setup, keymaps, or options."
    - match: "**/plugins/*.lua"
      systemPrompt: "Summarize changes to plugin specs (lazy loading, opts, keys)."
    - match: "**/*.md"
      skip: true

commit:
  default:
    profile: "gemini-pro"
    strategy: "summarize"
    systemPrompt: >-
      You are an expert on Git and Conventional Commits for meowvim.

      PROJECT CONTEXT:
      Meowvim is a modern Neovim distribution featuring:
      - Lua-based configuration with lazy.nvim plugin manager
      - Modular plugin architecture (50+ curated plugins)
      - Zero-configuration philosophy with sensible defaults
      - Modern UI (lualine, bufferline, which-key, noice.nvim)
      - Cross-platform with macOS optimization and Neovide GUI support

      COMMIT TYPES:
      - feat: New plugin, feature, or major configuration enhancement
      - fix: Bug fix, broken plugin configuration, or startup issue
      - refactor: Code reorganization, configuration cleanup, or pattern improvements
      - perf: Performance improvement (startup time, lazy loading)
      - docs: Documentation updates (README, comments)
      - chore: Maintenance (plugin version updates, lock file changes)

      OUTPUT: Generate ONLY the commit message in Conventional Commits format.

pr:
  default:
    profile: "smart"
    strategy: "summarize"
    systemPrompt: >-
      You are an expert Neovim configuration developer creating a PR description for meowvim.

      PROJECT CONTEXT:
      - Modular architecture with separate plugin files in lua/plugins/
      - lazy.nvim plugin manager with lazy loading
      - Support for Catppuccin and Tokyo Night themes
      - Cross-platform (macOS/Linux) and GUI (Neovide) support

      OUTPUT STRUCTURE (Markdown):
      # <Clear, Descriptive PR Title>

      ## Summary
      2-4 sentences explaining what this PR adds or fixes and why.

      ## Changes
      - **Plugin Configuration**: Changes to `lua/plugins/*.lua`
      - **Core Configuration**: Changes to `lua/config/*.lua` or `init.lua`
      - **UI/UX**: Theme or interface updates
      - **Performance**: Startup time or lazy loading optimizations

      ## Technical Details
      - **Implementation**: How the feature integrates with existing structure
      - **Lazy Loading**: Strategy used (event/cmd/ft)
      - **Dependencies**: New plugins or tools required

      ## Testing
      - Verified in terminal and Neovide
      - Checked with Catppuccin and Tokyo Night themes
      - Confirmed no startup errors